name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read mod_version
        id: version
        run: |
          VERSION=$(grep -E '^\s*mod_version\s*=' gradle.properties | sed -E 's/.*=\s*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Mod version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, will skip publishing."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Locate artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FABRIC="fabric/build/libs/openysm-fabric-${VERSION}.jar"
          FORGE="forge/build/libs/openysm-forge-${VERSION}.jar"
          if [ ! -f "$FABRIC" ]; then
            echo "Fabric jar not found at $FABRIC"; ls -la fabric/build/libs || true; exit 1
          fi
          if [ ! -f "$FORGE" ]; then
            echo "Forge jar not found at $FORGE"; ls -la forge/build/libs || true; exit 1
          fi
          echo "fabric=$FABRIC" >> "$GITHUB_OUTPUT"
          echo "forge=$FORGE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openysm-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.fabric }}
            ${{ steps.artifacts.outputs.forge }}

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target "${{ github.sha }}" \
            "${{ steps.artifacts.outputs.fabric }}" \
            "${{ steps.artifacts.outputs.forge }}"
